[gcode_macro START_PRINT]
#   Use START_PRINT for the slicer starting script - PLEASE CUSTOMISE THE SCRIPT
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set MATERIAL = params.MATERIAL|default('PLA')|string %} ; Get material type from slicer

    RESPOND TYPE=command MSG='Bed: {BED_TEMP} C'
    RESPOND TYPE=command MSG='Ext: {EXTRUDER_TEMP} C'
    RESPOND TYPE=command MSG='Mat: {MATERIAL}'

    # M109 S170                       # 预热热端
    # M190 S{BED_TEMP}                # 设置热床温度并等待
    G92 E0                          # 重置挤出机
    BED_MESH_CLEAR                  # 卸载网床
    G28                             # 归位所有轴
    #Z_TILT_ADJUST                   # 龙门架调平
    #CALIBRATE_Z                    # 自动校准Z
    #SET_MATERIAL                   # 根据耗材类型加载网床
    
    {% if MATERIAL == 'PLA' %}
        BED_MESH_PROFILE LOAD="PLA60"   # 加载PLA网床
    {% elif MATERIAL == 'TPU' %}
        BED_MESH_PROFILE LOAD="PLA60"   # 加载PLA网床
    {% elif MATERIAL == 'PETG' %}
        BED_MESH_PROFILE LOAD="PETG80"  # 加载PETG网床
    {% else %}
        RESPOND TYPE=command MSG='Check Material Type!'
        RESPOND TYPE=command MSG='No Bed Mesh Profile!'
        CANCEL_PRINT
        M117 Cancel Printing!
    {% endif %}
    
    #G28 Z                           # 归位Z轴
    #G0 X175 Y175 Z30
    # UPDATE_DELAYED_GCODE ID=Warehouse_temperature DURATION=300          # 等待仓温，延迟5分钟（打印ABS）
    # M109 S{EXTRUDER_TEMP}           # 设置热端温度并等待
    # clean_nozzle                  # 喷嘴清洁
    #G0 X175 Y175 Z30 F3600
    #G1 Z20 F3000                   # 将喷嘴移离热床

    #STATUS_BUSY

    INTRO_LINE                      # 划线清理

    M117 Printing...
    
[gcode_macro END_PRINT]
#   Use END_PRINT for the slicer ending script
gcode:
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    
    #   Check end position to determine safe directions to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    #  Commence END_PRINT
    M400                             ; wait for buffer to clear
    G92 E0                           ; zero the extruder
    G1 E-2.0 F3600                   ; retract
    G91                              ; relative positioning
    G0 Z{z_safe} F3600               ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000    ; move nozzle to remove stringing
    
    M104 S0                          ; turn off hotend
    M140 S0                          ; turn off bed
    M106 S0                          ; turn off fan
    # M107                             ; turn off fan
    G90                              ; absolute positioning
    G0 X{max_x / 2} Y{max_y} F3600   ; park nozzle at rear
    BED_MESH_CLEAR
    
    M117 Finished!
    
[gcode_macro INTRO_LINE]
gcode:
    # 划线清理（左边延Y轴划线）
    #G90                          # 绝对定位
    #G1 X20 Y100 Z0.2 F2400       # 第一条线开始点
    #G1 Y200 F2400 E15            # 第一条线结束点
    #G1 X25 F2400                 # 第二条线开始点
    #G1 Y100 F2400 E15            # 第二条线结束点
    #G1 Z5 F2400                  # 抬升

    # 划线清理（前面延X轴划线）
    G90                          # 绝对定位
    G1 X10 Y8 Z0.2 F1800         # 第一条线开始点
    G1 X110 F1800 E10            # 第一条线结束点
    G1 Y12 F1800                 # 第二条线开始点
    G1 X50 F1800 E10             # 第二条线结束点
    G1 Z3 F1800                  # 抬升
